<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sirly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#0d4a2e;--green-mid:#1a6b42;--green-card:#16573a;--green-light:#1e7a4a;
  --lime:#a8e063;--lime-dark:#7ec832;--white:#ffffff;--white-80:rgba(255,255,255,0.80);
  --white-50:rgba(255,255,255,0.50);--white-20:rgba(255,255,255,0.20);--white-10:rgba(255,255,255,0.10);
  --white-06:rgba(255,255,255,0.06);--acc:var(--lime);--acc-text:#0d4a2e;--hint:var(--white-50);
  --bg2:var(--green-card);--border:var(--white-10);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;background:var(--green-dark);color:var(--white);font-size:14px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
.page{display:none;padding:16px;position:relative;z-index:1}
.page.active{display:block}
.home-header{padding:28px 0 20px}
.home-title{font-size:26px;font-weight:800;letter-spacing:-0.6px;line-height:1.2;color:var(--white)}
.home-title span{color:var(--lime)}
.home-sub{font-size:13px;color:var(--white-50);margin-top:5px;font-weight:500}
.logout-btn{position:fixed;top:10px;right:52px;z-index:50;border:1px solid var(--white-10);background:var(--white-06);backdrop-filter:blur(8px);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--white-80)}
.page-topbar{position:sticky;top:0;z-index:10;background:var(--green-dark);padding:10px 16px 0;margin:-16px -16px 16px;}
.page-header{display:flex;align-items:center;gap:8px;padding:10px 0 12px;border-bottom:1px solid var(--white-10);margin-bottom:16px}
.back-btn{background:var(--white-10);border:none;font-size:12px;color:var(--white);cursor:pointer;font-family:inherit;font-weight:600;padding:6px 10px;border-radius:10px;display:flex;align-items:center;gap:3px;transition:background .15s;white-space:nowrap;flex-shrink:0;}
.back-btn:active{background:var(--white-20)}
.page-title{font-size:15px;font-weight:700;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.nav-card{background:var(--green-card);border:1px solid var(--white-10);border-radius:18px;padding:18px 16px 38px;cursor:pointer;position:relative;min-height:90px;transition:transform .15s,background .15s;overflow:hidden;}
.nav-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:70px;height:70px;background:var(--lime);opacity:.06;border-radius:50%;}
.nav-card:active{transform:scale(.97);background:var(--green-light)}
.nav-card.dragging{opacity:.4}
.nav-card.drag-over{outline:2px dashed var(--lime)}
.nav-card-title{font-size:14px;font-weight:700;color:var(--white);line-height:1.4;margin-top:4px}
.nav-card-arrow{position:absolute;bottom:14px;right:16px;font-size:18px;color:var(--lime);font-weight:700}
.nav-card-drag{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:3px;padding:4px;cursor:grab;opacity:.35}
.nav-card-drag span{display:block;width:13px;height:2px;background:var(--white);border-radius:2px}
.nav-card-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.nav-card:hover .nav-card-actions{opacity:1}
.nav-card.acad-card{background:linear-gradient(135deg,#1a3d55,#0e2e40)}
.add-btn{width:100%;padding:13px;background:var(--white-06);border:1.5px dashed var(--white-20);border-radius:14px;font-size:13px;color:var(--white-50);cursor:pointer;font-family:inherit;margin-top:6px;transition:background .15s;}
.add-btn:active{background:var(--white-10)}
.add-item-btn{width:100%;padding:11px;background:var(--white-06);border:1.5px dashed var(--white-20);border-radius:12px;font-size:13px;color:var(--white-50);cursor:pointer;font-family:inherit;margin-top:8px;transition:background .15s;}
.add-item-btn:active{background:var(--white-10)}
.search-wrap{margin-bottom:14px}
.search-inp{width:100%;padding:10px 14px;border:1px solid var(--white-10);border-radius:12px;font-size:13px;font-family:inherit;background:var(--white-06);color:var(--white);outline:none;transition:border-color .15s;}
.search-inp::placeholder{color:var(--white-50)}
.search-inp:focus{border-color:var(--lime)}
.section-list{display:flex;flex-direction:column;gap:8px}
.section-item{background:var(--green-card);border:1px solid var(--white-10);border-radius:14px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;}
.section-item:active{background:var(--green-light)}
.section-item.dragging{opacity:.4}
.section-item.drag-over{border:2px dashed var(--lime)}
.section-num{width:30px;height:30px;border-radius:9px;background:var(--white-10);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--lime);flex-shrink:0;margin-right:12px;}
.section-name{font-size:14px;font-weight:600;color:var(--white)}
.chevron{color:var(--white-50);font-size:18px;font-weight:300}
.drag-handle{display:flex;flex-direction:column;gap:3px;padding:4px;cursor:grab;margin-right:8px;opacity:.3}
.drag-handle span{display:block;width:14px;height:2px;background:var(--white);border-radius:2px}
.drag-handle:active{cursor:grabbing}
.form-box{background:var(--green-card);border:1px solid var(--white-10);border-radius:16px;padding:16px;margin-top:10px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--white-10);border-radius:10px;font-size:13px;font-family:inherit;background:var(--white-06);color:var(--white);outline:none;margin-top:5px;transition:border-color .15s;}
.fi:focus{border-color:var(--lime)}
.fi::placeholder{color:var(--white-50)}
.flbl{font-size:11px;font-weight:700;color:var(--white-50);text-transform:uppercase;letter-spacing:.6px}
.frow{margin-bottom:12px}
.fbtns{display:flex;gap:8px;margin-top:14px}
.fsave{background:var(--lime);color:var(--green-dark);border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s;}
.fsave:active{background:var(--lime-dark)}
.fcancel{background:var(--white-10);border:none;padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;color:var(--white-80);font-family:inherit;}
.action-btns{display:flex;gap:4px;align-items:center}
.abtn{border:1px solid var(--white-10);background:var(--white-06);border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;color:var(--white-50);transition:background .15s;}
.abtn:active{background:var(--white-20)}
.abtn-red{border-color:rgba(255,100,100,.25);color:#ff7070}
.tree-wrap{overflow-x:auto;padding-bottom:16px}
.tree-col{display:flex;flex-direction:column}
.node-row{display:flex;flex-direction:row;align-items:flex-start;margin-bottom:10px}
.node-card{width:260px;flex-shrink:0;background:var(--green-card);border:1px solid var(--white-10);border-radius:14px;padding:14px;position:relative;}
.node-num{position:absolute;top:10px;left:10px;width:26px;height:26px;background:var(--lime);color:var(--green-dark);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.node-name{font-size:13px;font-weight:600;line-height:1.4;margin-top:32px;padding-right:36px;color:var(--white)}
.node-msg{background:var(--white-06);border-radius:8px;padding:8px 30px 8px 10px;font-size:11px;line-height:1.6;margin-top:8px;white-space:pre-wrap;position:relative;font-family:monospace;color:var(--white-80);border:1px solid var(--white-10);}
.copy-btn{width:20px;height:20px;border:1px solid var(--white-10);background:var(--green-dark);border-radius:5px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:.7;color:var(--white);}
.node-link{font-size:11px;margin-top:8px;word-break:break-all}
.node-link a{display:inline-flex;align-items:center;gap:5px;background:var(--lime);color:var(--green-dark);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;}
.node-corner{position:absolute;top:6px;right:6px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.node-card:hover .node-corner{opacity:1}
.corner-btn{width:22px;height:22px;border:1px solid var(--white-10);background:var(--green-dark);border-radius:6px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--white-50);}
.corner-btn.always{opacity:1!important}
.connector{display:flex;flex-direction:row;align-items:stretch}
.vbar-wrap{width:24px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.vbar{width:1px;background:var(--white-20);flex:1}
.children-col{display:flex;flex-direction:column}
.child-row{display:flex;align-items:flex-start}
.hbar{width:24px;height:1px;background:var(--white-20);flex-shrink:0;margin-top:22px}
.add-child-btn{width:260px;padding:8px 12px;background:var(--white-06);border:1.5px dashed var(--white-20);border-radius:10px;font-size:11px;color:var(--white-50);cursor:pointer;font-family:inherit;text-align:left;margin-bottom:8px;}
.add-root-btn{padding:10px 16px;background:var(--white-06);border:1.5px dashed var(--white-20);border-radius:12px;font-size:12px;color:var(--white-50);cursor:pointer;font-family:inherit;margin-top:8px;display:flex;align-items:center;gap:6px;}
.node-form{width:260px;background:var(--green-card);border:1px solid var(--white-10);border-radius:12px;padding:14px;margin-bottom:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--green-card);border:1px solid var(--white-10);border-radius:20px;padding:24px;width:300px}
.modal-title{font-size:18px;font-weight:800;margin-bottom:4px;color:var(--white)}
.modal-sub{font-size:12px;color:var(--white-50);margin-bottom:16px}
.modal-err{font-size:11px;color:#ff7070;margin-top:6px;display:none}
.modal-err.show{display:block}
.confirm-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.confirm-bg.open{display:flex}
.confirm-box{background:var(--green-card);border:1px solid var(--white-10);border-radius:20px;padding:24px;width:280px;text-align:center}
.confirm-msg{font-size:15px;font-weight:600;color:var(--white);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-yes{background:#e53935;color:#fff;border:none;padding:10px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.confirm-no{background:var(--white-10);color:var(--white-80);border:none;padding:10px 20px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit}
.notif{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--lime);color:var(--green-dark);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;cursor:zoom-out}
.img-modal.open{display:flex}
.img-modal img{max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain}
.breadcrumb{font-size:11px;color:var(--white-50);display:flex;flex-wrap:nowrap;gap:3px;align-items:center;overflow:hidden;position:relative;z-index:1;margin-bottom:4px;}
.bc-item{cursor:pointer;color:var(--lime);font-weight:600;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.bc-sep{opacity:.4;flex-shrink:0}
.bc-cur{color:var(--white-80);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.node-msg-collapsed{max-height:80px;overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,black 40%,transparent 100%);mask-image:linear-gradient(to bottom,black 40%,transparent 100%)}
.node-msg-btns{position:absolute;top:6px;right:6px;display:flex;gap:3px}
.expand-btn{width:20px;height:20px;border:1px solid var(--white-10);background:var(--green-dark);border-radius:5px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--white-50)}
.acad-intro{background:rgba(168,224,99,.1);border-left:3px solid var(--lime);border-radius:0 12px 12px 0;padding:12px 16px;margin-bottom:16px;font-size:13px;line-height:1.7;color:var(--white-80);}
.acad-section-block{background:var(--green-card);border:1px solid var(--white-10);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.acad-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding:4px 10px;border-radius:8px;display:inline-block;}
.acad-label-standard{background:rgba(99,102,241,.18);color:#a5b4fc}
.acad-label-violation{background:rgba(255,112,112,.15);color:#ff9090}
.acad-label-decision{background:rgba(168,224,99,.15);color:var(--lime)}
.acad-content{font-size:13px;line-height:1.85;color:var(--white-80)}
.acad-content ul{padding-left:18px;margin:6px 0}
.acad-content li{margin-bottom:4px}
.acad-content b{font-weight:700;color:var(--white)}
</style>
</head>
<body>

<button class="logout-btn" id="logout-btn">⚙ Chiqish</button>

<div class="page active" id="p-home">
  <div class="home-header">
    <div class="home-title">Kim nima ishni<br><span>qanday qiladi?</span></div>
    <div class="home-sub">Bo'limni tanlang</div>
  </div>
  <div id="sections-grid" class="cards-grid"></div>
  <div id="section-form"></div>
</div>
<div class="page" id="p-section">
  <div class="page-topbar"><div class="breadcrumb" id="bc-section"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-home')">← Orqaga</button><span class="page-title" id="section-title"></span></div></div>
  <div class="search-wrap"><input class="search-inp" id="search-cats" placeholder="🔍 Qidirish..." oninput="renderCats()"></div>
  <div id="cats-list" class="section-list"></div><div id="cat-form"></div>
</div>
<div class="page" id="p-cat">
  <div class="page-topbar"><div class="breadcrumb" id="bc-cat"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-section')">← Orqaga</button><span class="page-title" id="cat-title"></span></div></div>
  <div class="search-wrap"><input class="search-inp" id="search-flows" placeholder="🔍 Qidirish..." oninput="renderFlows()"></div>
  <div id="flows-list" class="section-list"></div><div id="flow-form"></div>
</div>
<div class="page" id="p-flow">
  <div class="page-topbar"><div class="breadcrumb" id="bc-flow"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-cat')">← Orqaga</button><span class="page-title" id="flow-title"></span><div id="flow-admin-btns" style="display:none;margin-left:auto;gap:4px;flex-shrink:0"><button class="abtn" onclick="editFlowName()">✏</button><button class="abtn abtn-red" onclick="deleteFlow()">✕</button></div></div></div>
  <div id="flow-name-form" style="display:none;margin-bottom:14px"></div>
  <div class="tree-wrap" id="tree-wrap"></div><div id="root-form"></div>
</div>
<div class="page" id="p-acad-cats">
  <div class="page-topbar"><div class="breadcrumb" id="bc-acad-cats"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-home')">← Orqaga</button><span class="page-title" id="acad-sec-title"></span></div></div>
  <div id="acad-cats-list" class="section-list"></div><div id="acad-cats-form"></div>
</div>
<div class="page" id="p-acad-items">
  <div class="page-topbar"><div class="breadcrumb" id="bc-acad-items"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-acad-cats')">← Orqaga</button><span class="page-title" id="acad-cat-title"></span></div></div>
  <div id="acad-cat-intro-box"></div><div id="acad-items-list" class="section-list"></div><div id="acad-items-form"></div>
</div>
<div class="page" id="p-acad-detail">
  <div class="page-topbar"><div class="breadcrumb" id="bc-acad-detail"></div><div class="page-header"><button class="back-btn" onclick="goBack('p-acad-items')">← Orqaga</button><span class="page-title" id="acad-item-title"></span></div></div>
  <div id="acad-detail-body"></div>
</div>
<div class="modal-bg" id="login-modal">
  <div class="modal-box"><div class="modal-title">Admin kirish</div><div class="modal-sub">Tahrirlash uchun kiring</div>
  <div class="frow"><label class="flbl">Login</label><input class="fi" id="l-login" autocomplete="off"></div>
  <div class="frow"><label class="flbl">Parol</label><input class="fi" id="l-pass" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <div class="modal-err" id="l-err">Login yoki parol noto'g'ri</div>
  <div class="fbtns" style="margin-top:16px"><button class="fsave" onclick="doLogin()">Kirish</button><button class="fcancel" onclick="closeModal()">Bekor</button></div></div>
</div>
<div class="img-modal" id="img-modal" onclick="closeImg()"><img id="img-src" src="" alt=""></div>
<div class="notif" id="notif"></div>
<div style="position:fixed;top:10px;right:12px;z-index:50"><button id="admin-btn" onclick="handleAdmin()" style="border:1px solid var(--white-10);background:var(--white-06);backdrop-filter:blur(8px);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--white-80)">⚙</button></div>
<div class="confirm-bg" id="confirm-modal"><div class="confirm-box"><div class="confirm-msg" id="confirm-msg">O'chirasizmi?</div><div class="confirm-btns"><button class="confirm-yes" id="confirm-yes">O'chirish</button><button class="confirm-no" onclick="closeConfirm()">Bekor</button></div></div></div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

// USER_ID from URL
var urlParams = new URLSearchParams(window.location.search);
var USER_ID = urlParams.get('uid') || 'sirly_guest';

// Logout
document.getElementById('logout-btn').addEventListener('click', function(){
  localStorage.removeItem('app_login');
  window.location.href = '/';
});

// Sirly Supabase
const SB_URL='https://ubakgpkcemlchpfejmke.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViYWtncGtjZW1sY2hwZmVqbWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjc3NzUsImV4cCI6MjA5NTkwMzc3NX0.wkKSmoTB9RwREFjcJfe0dNBzZDEw2DHxNM3G6erHSJU';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

let confirmCallback=null;
function askConfirm(msg,cb){confirmCallback=cb;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-modal').classList.add('open');document.getElementById('confirm-yes').onclick=()=>{closeConfirm();cb();};}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');confirmCallback=null;}

const ADMIN_L='testlogin',ADMIN_P='test26';
let isAdmin=false;
const DB_KEY='biznes_db_v1';
let db={sections:[]};
let curSection=null,curCat=null,curFlow=null;
let navStack=['p-home'];

async function save(){
  try{await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.main',{method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify({data:db})});}
  catch(e){localStorage.setItem(DB_KEY,JSON.stringify(db));}
}
async function load(){
  try{const r=await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.main',{headers:SB_H});const rows=await r.json();if(rows&&rows.length&&rows[0].data&&rows[0].data.sections)db=rows[0].data;else{const d=localStorage.getItem(DB_KEY);if(d)db=JSON.parse(d);}}
  catch(e){const d=localStorage.getItem(DB_KEY);if(d)db=JSON.parse(d);}
}

function goTo(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active','fade');if(navStack[navStack.length-1]!==p)navStack.push(p);render(p);window.scrollTo(0,0);}
function goBack(p){while(navStack[navStack.length-1]!==p&&navStack.length>1)navStack.pop();document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');render(p);window.scrollTo(0,0);}
function render(p){
  if(p==='p-home')renderSections();
  else if(p==='p-section')renderCats();
  else if(p==='p-cat')renderFlows();
  else if(p==='p-flow')renderTree();
  else if(p==='p-acad-cats')renderAcadCats();
  else if(p==='p-acad-items')renderAcadItems();

let dragSrcIndex=null,dragContext=null;
function initDrag(listEl,getItems,setItems){const items=listEl.querySelectorAll('[draggable="true"]');items.forEach((el,i)=>{el.addEventListener('dragstart',e=>{dragSrcIndex=i;dragContext={getItems,setItems};e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});el.addEventListener('dragend',()=>{el.classList.remove('dragging');listEl.querySelectorAll('[draggable="true"]').forEach(x=>x.classList.remove('drag-over'));});el.addEventListener('dragover',e=>{e.preventDefault();listEl.querySelectorAll('[draggable="true"]').forEach(x=>x.classList.remove('drag-over'));el.classList.add('drag-over');});el.addEventListener('drop',e=>{e.preventDefault();if(dragSrcIndex===null||dragSrcIndex===i)return;const arr=dragContext.getItems();const moved=arr.splice(dragSrcIndex,1)[0];arr.splice(i,0,moved);dragContext.setItems(arr);save();dragSrcIndex=null;dragContext=null;});});}
function initTouchDrag(listEl,getItems,setItems,selector='[draggable="true"]'){let ti=null,clone=null,startY=0;const items=()=>listEl.querySelectorAll(selector);listEl.addEventListener('touchstart',e=>{const handle=e.target.closest('.drag-handle,.nav-card-drag');if(!handle)return;const item=handle.closest(selector);const all=[...items()];ti=all.indexOf(item);startY=e.touches[0].clientY;clone=item.cloneNode(true);const rect=item.getBoundingClientRect();clone.style.cssText=`position:fixed;z-index:9999;width:${item.offsetWidth}px;opacity:0.8;pointer-events:none;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.4);top:${rect.top}px;left:${rect.left}px`;document.body.appendChild(clone);item.style.opacity='0.4';},{passive:true});listEl.addEventListener('touchmove',e=>{if(ti===null||!clone)return;e.preventDefault();const y=e.touches[0].clientY;const dy=y-startY;const rect=[...items()][ti].getBoundingClientRect();clone.style.top=(rect.top+dy)+'px';[...items()].forEach((el,i)=>{const r=el.getBoundingClientRect();el.classList.toggle('drag-over',i!==ti&&y>r.top&&y<r.bottom);});},{passive:false});listEl.addEventListener('touchend',e=>{if(ti===null)return;if(clone){clone.remove();clone=null;}[...items()].forEach(x=>{x.classList.remove('drag-over');x.style.opacity='';});const y=e.changedTouches[0].clientY;let target=ti;[...items()].forEach((el,i)=>{const r=el.getBoundingClientRect();if(y>r.top&&y<r.bottom&&i!==ti)target=i;});if(target!==ti){const arr=getItems();const moved=arr.splice(ti,1)[0];arr.splice(target,0,moved);setItems(arr);save();}ti=null;},{passive:true});}

const ACAD_KEY='academy_db_v1';
let acadDb={sections:[]};
let curAcadSec=null,curAcadCat=null,curAcadItem=null;

async function acadSave(){try{await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.academy',{method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify({data:acadDb})});}catch(e){localStorage.setItem(ACAD_KEY,JSON.stringify(acadDb));}}
async function acadLoad(){try{const r=await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.academy',{headers:SB_H});const rows=await r.json();if(rows&&rows.length&&rows[0].data&&rows[0].data.sections){acadDb=rows[0].data;}else{const d=localStorage.getItem(ACAD_KEY);if(d)acadDb=JSON.parse(d);try{await fetch(SB_URL+'/rest/v1/biznes_data',{method:'POST',headers:{...SB_H,'Prefer':'return=minimal'},body:JSON.stringify({id:'academy',data:acadDb})});}catch(e2){}}}catch(e){const d=localStorage.getItem(ACAD_KEY);if(d)acadDb=JSON.parse(d);}renderSections();}

function formatAcadText(t){if(!t)return '';let s=esc(t);s=s.split('**').map((p,i)=>i%2===1?'<b>'+p+'</b>':p).join('');const lines=s.split('\n');let out=[],inList=false;lines.forEach(line=>{if(line.startsWith('* ')){if(!inList){out.push('<ul>');inList=true;}out.push('<li>'+line.slice(2)+'</li>');}else{if(inList){out.push('</ul>');inList=false;}out.push(line?(line+'<br>'):'<br>');}});if(inList)out.push('</ul>');return out.join('');}
function openAcadSection(id){curAcadSec=id;curAcadCat=null;curAcadItem=null;goTo('p-acad-cats');}
function renderAcadCats(){const sec=acadDb.sections.find(s=>s.id===curAcadSec);if(!sec)return;document.getElementById('acad-sec-title').textContent=sec.title;let h='';(sec.cats||[]).forEach((cat,i)=>{h+=`<div class="section-item" onclick="openAcadCat('${cat.id}')" ${isAdmin?'draggable="true"':''}><div style="display:flex;align-items:center;flex:1;min-width:0">${isAdmin?`<div class="drag-handle" onclick="event.stopPropagation()"><span></span><span></span><span></span></div>`:''}<div class="section-num">${String(i+1).padStart(2,'00')}</div><div style="min-width:0"><div class="section-name">${esc(cat.title)}</div>${cat.intro?`<div style="font-size:11px;color:var(--white-50);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(cat.intro.substring(0,60))}${cat.intro.length>60?'...':''}</div>`:''}</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${isAdmin?`<div class="action-btns"><button class="abtn" onclick="event.stopPropagation();showAcadCatForm('${curAcadSec}','${cat.id}')">✏</button><button class="abtn abtn-red" onclick="event.stopPropagation();delAcadCat('${curAcadSec}','${cat.id}')">✕</button></div>`:''}<span class="chevron">›</span></div></div>`;});if(!sec.cats||!sec.cats.length)h='<div style="text-align:center;padding:32px;color:var(--white-50);font-size:13px">Kategoriyalar yo\'q</div>';document.getElementById('acad-cats-list').innerHTML=h;if(isAdmin){document.getElementById('acad-cats-form').innerHTML=`<button class="add-item-btn" onclick="showAcadCatForm('${curAcadSec}')">＋ Kategoriya qo'shish</button>`;const listEl=document.getElementById('acad-cats-list');initDrag(listEl,()=>sec.cats,arr=>{sec.cats=arr;acadSave();renderAcadCats();});initTouchDrag(listEl,()=>sec.cats,arr=>{sec.cats=arr;acadSave();renderAcadCats();});}else document.getElementById('acad-cats-form').innerHTML='';updateAcadBc();}
function openAcadCat(id){curAcadCat=id;curAcadItem=null;goTo('p-acad-items');}
function renderAcadItems(){const sec=acadDb.sections.find(s=>s.id===curAcadSec);if(!sec)return;const cat=sec.cats.find(c=>c.id===curAcadCat);if(!cat)return;document.getElementById('acad-cat-title').textContent=cat.title;const introBox=document.getElementById('acad-cat-intro-box');introBox.innerHTML=cat.intro?`<div class="acad-intro">${formatAcadText(cat.intro)}</div>`:'';let h='';(cat.items||[]).forEach((item,i)=>{h+=`<div class="section-item" onclick="openAcadItem('${item.id}')" ${isAdmin?'draggable="true"':''}><div style="display:flex;align-items:center;flex:1;min-width:0">${isAdmin?`<div class="drag-handle" onclick="event.stopPropagation()"><span></span><span></span><span></span></div>`:''}<div class="section-num">${String(i+1).padStart(2,'00')}</div><div class="section-name">${esc(item.title)}</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">${isAdmin?`<div class="action-btns"><button class="abtn" onclick="event.stopPropagation();showAcadItemForm('${curAcadSec}','${curAcadCat}','${item.id}')">✏</button><button class="abtn abtn-red" onclick="event.stopPropagation();delAcadItem('${curAcadSec}','${curAcadCat}','${item.id}')">✕</button></div>`:''}<span class="chevron">›</span></div></div>`;});if(!cat.items||!cat.items.length)h='<div style="text-align:center;padding:32px;color:var(--white-50);font-size:13px">Mavzular yo\'q</div>';document.getElementById('acad-items-list').innerHTML=h;if(isAdmin){document.getElementById('acad-items-form').innerHTML=`<button class="add-item-btn" onclick="showAcadItemForm('${curAcadSec}','${curAcadCat}')">＋ Mavzu qo'shish</button>`;const listEl=document.getElementById('acad-items-list');initDrag(listEl,()=>cat.items,arr=>{cat.items=arr;acadSave();renderAcadItems();});initTouchDrag(listEl,()=>cat.items,arr=>{cat.items=arr;acadSave();renderAcadItems();});}else document.getElementById('acad-items-form').innerHTML='';updateAcadBc();}
function openAcadItem(id){curAcadItem=id;goTo('p-acad-detail');}
function renderAcadDetail(){const sec=acadDb.sections.find(s=>s.id===curAcadSec);if(!sec)return;const cat=sec.cats.find(c=>c.id===curAcadCat);if(!cat)return;const item=cat.items.find(i=>i.id===curAcadItem);if(!item)return;document.getElementById('acad-item-title').textContent=item.title;let h='';if(item.standard)h+=`<div class="acad-section-block"><div class="acad-section-label acad-label-standard">Standart</div><div class="acad-content">${formatAcadText(item.standard)}</div></div>`;if(item.violation)h+=`<div class="acad-section-block"><div class="acad-section-label acad-label-violation">Qoidabuzarlik</div><div class="acad-content">${formatAcadText(item.violation)}</div></div>`;if(item.decision)h+=`<div class="acad-section-block"><div class="acad-section-label acad-label-decision">Qaror va harakat</div><div class="acad-content">${formatAcadText(item.decision)}</div></div>`;if(!item.standard&&!item.violation&&!item.decision&&item.content)h+=`<div class="acad-content" style="padding:4px 0;line-height:1.9;font-size:14px">${formatAcadText(item.content)}</div>`;if(isAdmin)h+=`<div style="margin-top:16px"><button class="fsave" onclick="showAcadItemForm('${curAcadSec}','${curAcadCat}','${item.id}',true)">✏ Tahrirlash</button></div><div id="acad-detail-form" style="margin-top:8px"></div>`;document.getElementById('acad-detail-body').innerHTML=h;updateAcadBc();}
function updateAcadBc(){const sec=acadDb.sections.find(s=>s.id===curAcadSec);const cat=sec?.cats?.find(c=>c.id===curAcadCat);const item=cat?.items?.find(i=>i.id===curAcadItem);const pages=['p-acad-cats','p-acad-items','p-acad-detail'];const titles={'p-home':'Bosh sahifa','p-acad-cats':sec?.title||'','p-acad-items':cat?.title||'','p-acad-detail':item?.title||''};pages.forEach(p=>{const el=document.getElementById('bc-'+p.replace('p-',''));if(!el)return;const stack=['p-home',...pages.slice(0,pages.indexOf(p)+1)];let html='';stack.forEach((pp,ii)=>{if(ii<stack.length-1)html+=`<span class="bc-item" onclick="goBack('${pp}')">${titles[pp]}</span><span class="bc-sep">›</span>`;else html+=`<span class="bc-cur">${titles[pp]}</span>`;});el.innerHTML=html;});}
function showAcadCatForm(secId,catId){const sec=acadDb.sections.find(s=>s.id===secId);const cat=catId?sec?.cats.find(c=>c.id===catId):null;document.getElementById('acad-cats-form').innerHTML=`<div class="form-box fade"><div class="frow"><label class="flbl">Kategoriya nomi</label><input class="fi" id="acf-title" value="${esc(cat?.title||'')}" placeholder="Kategoriya nomi..."></div><div class="frow"><label class="flbl">Kirish matni</label><textarea class="fi" id="acf-intro" style="min-height:80px;resize:vertical" placeholder="Bu bo'limda nima o'rganiladi...">${esc(cat?.intro||'')}</textarea></div><div class="fbtns"><button class="fsave" onclick="saveAcadCat('${secId}','${catId||''}')">Saqlash</button><button class="fcancel" onclick="renderAcadCats()">Bekor</button></div></div>`;document.getElementById('acf-title').focus();}
function saveAcadCat(secId,catId){const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;const title=document.getElementById('acf-title').value.trim();const intro=document.getElementById('acf-intro').value.trim();if(!title){notify('Nom kiriting!');return;}if(!sec.cats)sec.cats=[];if(catId){const c=sec.cats.find(x=>x.id===catId);if(c){c.title=title;c.intro=intro;}}else sec.cats.push({id:'ac'+Date.now(),title,intro,items:[]});acadSave();notify('Saqlandi ✓');renderAcadCats();}
function delAcadCat(secId,catId){askConfirm("Kategoriyani o'chirasizmi?",()=>{const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;sec.cats=sec.cats.filter(c=>c.id!==catId);acadSave();notify("O'chirildi ✓");renderAcadCats();});}
function showAcadItemForm(secId,catId,itemId,inDetail){const sec=acadDb.sections.find(s=>s.id===secId);const cat=sec?.cats.find(c=>c.id===catId);const item=itemId?cat?.items.find(i=>i.id===itemId):null;const containerId=inDetail?'acad-detail-form':'acad-items-form';document.getElementById(containerId).innerHTML=`<div class="form-box fade"><div class="frow"><label class="flbl">Mavzu nomi</label><input class="fi" id="afi-title" value="${esc(item?.title||'')}" placeholder="Mavzu nomi..."></div><div class="frow"><label class="flbl" style="color:#a5b4fc">Standart</label><textarea class="fi" id="afi-standard" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qoida va ruxsat chegaralari...">${esc(item?.standard||'')}</textarea></div><div class="frow"><label class="flbl" style="color:#ff9090">Qoidabuzarlik</label><textarea class="fi" id="afi-violation" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qachon buzilgan hisoblanadi...">${esc(item?.violation||'')}</textarea></div><div class="frow"><label class="flbl" style="color:var(--lime)">Qaror va harakat</label><textarea class="fi" id="afi-decision" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qaror va harakatlar...">${esc(item?.decision||'')}</textarea></div><div class="fbtns"><button class="fsave" onclick="saveAcadItem('${secId}','${catId}','${itemId||''}','${inDetail||''}')">Saqlash</button><button class="fcancel" onclick="${inDetail?'renderAcadDetail()':'renderAcadItems()}">Bekor</button></div></div>`;document.getElementById('afi-title').focus();}
function saveAcadItem(secId,catId,itemId,inDetail){const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;const cat=sec.cats.find(c=>c.id===catId);if(!cat)return;const title=document.getElementById('afi-title').value.trim();const standard=document.getElementById('afi-standard').value.trim();const violation=document.getElementById('afi-violation').value.trim();const decision=document.getElementById('afi-decision').value.trim();if(!title){notify('Nom kiriting!');return;}if(!cat.items)cat.items=[];if(itemId){const it=cat.items.find(x=>x.id===itemId);if(it){it.title=title;it.standard=standard;it.violation=violation;it.decision=decision;}}else cat.items.push({id:'ai'+Date.now(),title,standard,violation,decision});acadSave();notify('Saqlandi ✓');if(inDetail)renderAcadDetail();else renderAcadItems();}
function delAcadItem(secId,catId,itemId){askConfirm("Mavzuni o'chirasizmi?",()=>{const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;const cat=sec.cats.find(c=>c.id===catId);if(!cat)return;cat.items=cat.items.filter(i=>i.id!==itemId);acadSave();notify("O'chirildi ✓");renderAcadItems();});}
function toggleMsg(id){var wrap=document.getElementById('nm-wrap-'+id);var btn=document.getElementById('nm-btn-'+id);if(!wrap)return;var collapsed=wrap.classList.contains('node-msg-collapsed');if(collapsed){wrap.classList.remove('node-msg-collapsed');btn.textContent='▲';}else{wrap.classList.add('node-msg-collapsed');btn.textContent='▼';}}

load().then(()=>{renderSections();updateBc();});
acadLoad().catch(()=>{});
</script>
</body>
