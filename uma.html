<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Uma-tizim</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#f0f3ee;--bg2:#ffffff;--bg3:#e2e8de;--accent:#558237;--accent2:#a4b83f;--dark:#1e5927;
  --light:#a9b7a3;--text:#1e2e1a;--text2:#558237;--text3:#7a9669;
  --danger:#c0392b;--warn:#AA7B08;--radius:14px;--radius-sm:8px;--blue:#1a6fb5;--blue-bg:#eaf2fb;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px;}
.header{background:var(--bg2);padding:16px 20px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:10px;}
.back-btn{width:32px;height:32px;background:var(--bg3);border:none;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.logo{width:36px;height:36px;background:var(--dark);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-title{font-size:17px;font-weight:600;color:var(--dark);}
.header-sub{font-size:12px;color:var(--text3);margin-top:1px;}
.btn-add{width:36px;height:36px;background:var(--accent);border:none;border-radius:10px;color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-add.blue{background:var(--blue);}
.breadcrumb{padding:10px 16px;display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);overflow-x:auto;white-space:nowrap;background:var(--bg2);border-bottom:1px solid var(--bg3);}
.breadcrumb span{cursor:pointer;}
.breadcrumb span:hover{color:var(--accent);}
.main{padding:20px 16px;}
.page-title{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;font-weight:500;}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px;transition:opacity 0.15s;}
.card:active{opacity:0.8;}
.card.danger{border-color:var(--danger);background:#fdf2f2;}
.card-icon{width:44px;height:44px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card.danger .card-icon{background:#fdecea;}
.card-info{flex:1;}
.card-name{font-size:15px;font-weight:500;color:var(--text);}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.card.danger .card-sub{color:var(--danger);}
.card-arrow{color:var(--light);font-size:20px;}
.day-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:10px;}
.day-card.warn-red{border-color:var(--danger);background:#fdf2f2;}
.day-date{width:44px;text-align:center;flex-shrink:0;}
.day-date-num{font-size:20px;font-weight:600;color:var(--dark);line-height:1;}
.day-date-month{font-size:11px;color:var(--text3);margin-top:2px;}
.day-divider{width:1px;height:36px;background:var(--bg3);flex-shrink:0;}
.day-info{flex:1;}
.day-name{font-size:15px;font-weight:500;color:var(--text);}
.day-meals{font-size:12px;color:var(--text3);margin-top:2px;}
.day-warn{font-size:11px;color:var(--danger);margin-top:2px;}
.today-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--accent);color:white;font-weight:500;flex-shrink:0;}
.past-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fdecea;color:var(--danger);font-weight:500;flex-shrink:0;}
.meal-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.meal-card.missing{border-color:var(--danger);background:#fdf2f2;}
.meal-card-header{display:flex;align-items:center;gap:10px;}
.meal-card-icon{font-size:22px;flex-shrink:0;}
.meal-card-info{flex:1;}
.meal-card-time{font-size:12px;color:var(--text3);font-weight:500;}
.meal-card-name{font-size:15px;font-weight:500;color:var(--text);margin-top:2px;}
.meal-card.missing .meal-card-name{color:var(--danger);}
.meal-card-arrow{color:var(--light);font-size:18px;}
.meal-card-items{font-size:12px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid var(--bg3);}
.meal-card-missing{font-size:12px;color:var(--danger);margin-top:4px;font-weight:500;}
.zapas-item{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.zapas-icon{font-size:28px;flex-shrink:0;}
.zapas-info{flex:1;}
.zapas-name{font-size:15px;font-weight:500;color:var(--text);}
.zapas-raw{font-size:12px;color:var(--text3);margin-top:2px;}
.zapas-date{font-size:11px;color:var(--light);margin-top:2px;}
.zapas-right{text-align:right;flex-shrink:0;}
.zapas-days{font-size:20px;font-weight:600;}
.zapas-days-lbl{font-size:11px;color:var(--text3);}
.status-green{color:var(--accent);}
.status-warn{color:var(--warn);}
.status-red{color:var(--danger);}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;}
.xarid-item{background:#fdf2f2;border:1px solid #f0c0c0;border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.xarid-icon{font-size:28px;flex-shrink:0;}
.xarid-info{flex:1;}
.xarid-name{font-size:15px;font-weight:500;color:var(--text);}
.xarid-amount{font-size:13px;color:var(--danger);margin-top:2px;}
.kitob-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;}
.kitob-card:active{opacity:0.8;}
.kitob-header{display:flex;align-items:flex-start;gap:12px;}
.kitob-emoji{font-size:30px;flex-shrink:0;}
.kitob-info{flex:1;}
.kitob-label{font-size:12px;color:var(--text3);}
.kitob-name{font-size:16px;font-weight:600;color:var(--text);margin-top:2px;}
.kitob-author{font-size:13px;color:var(--text3);margin-top:2px;}
.kitob-dates{font-size:12px;color:var(--text2);margin-top:4px;}
.kitob-progress{margin-top:12px;}
.kitob-progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px;}
.kitob-progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.kitob-progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width 0.3s;}
.kitob-done .kitob-progress-fill{background:var(--accent);}
.done-badge{font-size:11px;padding:2px 10px;border-radius:20px;background:#e8f5e0;color:var(--accent);font-weight:500;margin-top:8px;display:inline-block;}
.tarix-section{margin-top:16px;border-top:1px solid var(--bg3);padding-top:12px;}
.tarix-title{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.tarix-item{padding:10px 0;border-bottom:1px solid var(--bg3);}
.tarix-item:last-child{border-bottom:none;}
.tarix-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-bottom:4px;}
.tarix-bet{font-size:13px;font-weight:500;color:var(--text);}
.kitob-actions{display:flex;gap:8px;margin-top:12px;}
.kitob-btn{flex:1;padding:10px;background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);color:var(--text);font-size:13px;cursor:pointer;text-align:center;font-weight:500;}
.kitob-btn:active{background:var(--bg3);}
.kitob-btn.blue{background:var(--blue-bg);color:var(--blue);border-color:#b5d4f4;}
.kitob-btn.edit{color:var(--text3);font-size:12px;}
.ovqat-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.ovqat-icon{width:44px;height:44px;background:var(--bg3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ovqat-info{flex:1;}
.ovqat-name{font-size:15px;font-weight:500;color:var(--text);}
.ovqat-items{font-size:12px;color:var(--text3);margin-top:2px;}
.btn-sm{width:30px;height:30px;border:1px solid var(--bg3);background:var(--bg3);border-radius:var(--radius-sm);color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px 40px;width:100%;max-width:500px;border-top:2px solid var(--accent2);max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:16px;}
.search-input{width:100%;background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;}
.search-input:focus{border-color:var(--accent);}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;color:var(--text3);margin-bottom:6px;display:block;font-weight:500;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:15px;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-textarea{width:100%;background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:15px;outline:none;resize:none;min-height:80px;font-family:inherit;}
.form-textarea:focus{border-color:var(--accent);}
.amount-row{display:flex;align-items:center;gap:10px;}
.amount-input{flex:1;background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:20px;font-weight:600;outline:none;text-align:center;}
.amount-input:focus{border-color:var(--accent);}
.unit-lbl{font-size:15px;color:var(--text3);min-width:30px;}
.coef-info{font-size:13px;color:var(--text3);margin-top:8px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm);}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.btn-cancel{flex:1;padding:14px;background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--text3);font-size:15px;cursor:pointer;}
.btn-save{flex:2;padding:14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:white;font-size:15px;font-weight:600;cursor:pointer;}
.btn-save.blue{background:var(--blue);}
.btn-danger-full{flex:1;padding:14px;background:#fdecea;border:none;border-radius:var(--radius-sm);color:var(--danger);font-size:15px;font-weight:600;cursor:pointer;}
.product-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.product-btn{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;text-align:left;width:100%;}
.product-btn.selected{border-color:var(--accent);background:#e8f0e0;}
.product-btn-icon{font-size:22px;}
.product-btn-name{font-size:14px;font-weight:500;color:var(--text);}
.product-btn-unit{font-size:12px;color:var(--text3);}
.amount-section{display:none;border-top:1px solid var(--bg3);margin-top:12px;padding-top:14px;}
.amount-section.show{display:block;}
.ing-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ing-name{flex:1;font-size:14px;color:var(--text);}
.ing-amount{font-size:13px;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:20px;}
.ing-del{width:24px;height:24px;border:none;background:none;color:var(--light);font-size:16px;cursor:pointer;}
.meal-option{background:var(--bg);border:1px solid var(--bg3);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px;}
.meal-option.selected{border-color:var(--accent);background:#e8f0e0;}
.meal-option-icon{font-size:24px;}
.meal-option-name{font-size:15px;font-weight:500;color:var(--text);flex:1;}
.meal-option-items{font-size:12px;color:var(--text3);}
.confirm-box{background:#e8f0e0;border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;font-size:14px;color:var(--dark);text-align:center;border:1px solid var(--accent2);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:15px;margin-bottom:6px;color:var(--text2);}
.empty-sub{font-size:13px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:300;transition:transform 0.25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.izoh-full{font-size:15px;color:var(--text);line-height:1.6;padding:8px 0;}
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="modal-zadd"><div class="modal"><div class="modal-handle"></div><div class="modal-title">Mahsulot qo'shish</div><input class="search-input" id="zadd-search" placeholder="🔍 Qidirish..."><div class="product-list" id="zadd-list"></div><div class="amount-section" id="zadd-amount"><label class="form-label" id="zadd-label">Miqdor</label><div class="amount-row"><input class="amount-input" id="zadd-input" type="number" placeholder="0" min="0"><span class="unit-lbl" id="zadd-unit">g</span></div><div class="coef-info" id="zadd-coef" style="display:none"></div><div class="modal-btns"><button class="btn-cancel" id="zadd-cancel">Bekor</button><button class="btn-save" id="zadd-save">Qo'shish</button></div></div></div></div>

<div class="modal-overlay" id="modal-ovqat"><div class="modal"><div class="modal-handle"></div><div class="modal-title" id="ovqat-modal-title">Yangi ovqat</div><div class="form-group"><label class="form-label">Nomi</label><input class="form-input" id="ovqat-name" type="text" maxlength="30"></div><div class="form-group"><label class="form-label">Belgi</label><div style="display:flex;gap:8px;flex-wrap:wrap;" id="ovqat-emoji-grid"></div></div><div class="form-group"><label class="form-label">Tarkibi</label><div id="ovqat-ings"></div><button class="product-btn" id="ovqat-add-ing" style="margin-top:8px"><span class="product-btn-icon">➕</span><span class="product-btn-name">Mahsulot qo'shish</span></button></div><div class="modal-btns"><button class="btn-danger-full" id="ovqat-del" style="display:none">O'chirish</button><button class="btn-cancel" id="ovqat-cancel">Bekor</button><button class="btn-save" id="ovqat-save">Saqlash</button></div></div></div>

<script>
// USER_ID from URL
var urlParams = new URLSearchParams(window.location.search);
var USER_ID = urlParams.get('uid') || 'user_guest';
var API_URL = 'https://grafik-production.up.railway.app';

if(window.Telegram && window.Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

var STORAGE_KEY = 'umatizim_data_' + USER_ID;
var UZ_DAYS = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
var UZ_MONTHS = ['Yan','Fev','Mar','Apr','May','Iyun','Iyul','Avg','Sen','Okt','Noy','Dek'];

async function sbSave(){
  var payload={zapas:zapas,ovqatlar:ovqatlar,dayPlans:dayPlans,kitoblar:kitoblar};
  try{await fetch(API_URL+'/api/data/'+USER_ID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}
  catch(e){console.error('Save error:',e);}
}
async function sbLoad(){
  try{
    var r=await fetch(API_URL+'/api/data/'+USER_ID);
    var d=await r.json();
    if(d&&d.kitoblar!==undefined){
      zapas=d.zapas||[];ovqatlar=d.ovqatlar||[];
      if(!ovqatlar.length)ovqatlar=JSON.parse(JSON.stringify(DEFAULT_OVQATLAR));
      dayPlans=d.dayPlans||{};kitoblar=d.kitoblar||[];
      localStorage.setItem(STORAGE_KEY,JSON.stringify({zapas,ovqatlar,dayPlans,kitoblar}));
      return true;
    }
    return false;
  }catch(e){console.error('Load error:',e);return false;}
}
function loadData(){
  try{var d=localStorage.getItem(STORAGE_KEY);if(d){var p=JSON.parse(d);zapas=p.zapas||[];ovqatlar=p.ovqatlar||[];dayPlans=p.dayPlans||{};kitoblar=p.kitoblar||[];}if(!ovqatlar.length)ovqatlar=JSON.parse(JSON.stringify(DEFAULT_OVQATLAR));}
  catch(e){zapas=[];ovqatlar=JSON.parse(JSON.stringify(DEFAULT_OVQATLAR));dayPlans={};kitoblar=[];}
}
function saveData(){
  var payload={zapas,ovqatlar,dayPlans,kitoblar};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(payload));
  sbSave().catch(function(e){});
}
function dateStr(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmtDate(d){return('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2);}
function fmtDateStr(s){if(!s)return'';var p=s.split('-');return p[2]+'.'+p[1];}
function todayDateStr(){return dateStr(new Date());}
function getDayPlan(d){return dayPlans[dateStr(d)]||JSON.parse(JSON.stringify(DEFAULT_DAY_PLAN));}
function getDays(){var days=[];var t=new Date();t.setHours(0,0,0,0);var y=new Date(t);y.setDate(t.getDate()-1);days.push(y);for(var i=0;i<7;i++){var d=new Date(t);d.setDate(t.getDate()+i);days.push(d);}return days;}
function isToday(d){var t=new Date();t.setHours(0,0,0,0);return d.getTime()===t.getTime();}
function isYesterday(d){var t=new Date();t.setHours(0,0,0,0);var y=new Date(t);y.setDate(t.getDate()-1);return d.getTime()===y.getTime();}
function isPast(d){var t=new Date();t.setHours(0,0,0,0);return d.getTime()<t.getTime();}
function getOvqat(id){if(!id)return null;return ovqatlar.find(function(o){return o.id===id;})||null;}
function getProd(id){return DEFAULT_PRODUCTS.find(function(p){return p.id===id;})||null;}
function getRawNeeded(ing){if(ing.rawAmount!==undefined)return ing.rawAmount;var prod=getProd(ing.productId);if(!prod)return ing.amount||0;return prod.coef!==1?ing.amount/prod.coef:ing.amount;}
function getCookedAmount(ing){if(ing.cookedAmount!==undefined)return ing.cookedAmount;var prod=getProd(ing.productId);if(!prod)return ing.amount||0;return prod.coef!==1?Math.round(ing.rawAmount*prod.coef):ing.rawAmount;}
function calcRemainingForDay(productId,dayIndex,allDays){var zapItem=zapas.find(function(z){return z.productId===productId;});if(!zapItem)return 0;var available=zapItem.rawAmount;var entryDate=zapItem.entryDate?new Date(zapItem.entryDate):null;if(entryDate)entryDate.setHours(0,0,0,0);for(var i=0;i<dayIndex;i++){var d=allDays[i];if(entryDate&&d<entryDate)continue;var plan=getDayPlan(d);MEAL_TIMES.forEach(function(mt){var ovqat=getOvqat(plan[mt.key]);if(!ovqat)return;ovqat.ingredients.forEach(function(ing){if(ing.productId===productId)available-=getRawNeeded(ing);});});}return available;}
function dayHasMissing(d,dayIndex,allDays){if(isPast(d))return false;var plan=getDayPlan(d);for(var i=0;i<MEAL_TIMES.length;i++){var ovqat=getOvqat(plan[MEAL_TIMES[i].key]);if(!ovqat)continue;for(var j=0;j<ovqat.ingredients.length;j++){var ing=ovqat.ingredients[j];if(calcRemainingForDay(ing.productId,dayIndex,allDays)<getRawNeeded(ing))return true;}}return false;}
function getMissingForMeal(ovqatId,dayIndex,allDays){var ovqat=getOvqat(ovqatId);if(!ovqat)return[];var missing=[];ovqat.ingredients.forEach(function(ing){if(calcRemainingForDay(ing.productId,dayIndex,allDays)<getRawNeeded(ing)){var prod=getProd(ing.productId);if(prod)missing.push(prod.name);}});return missing;}
function findFirstMissingDay(){var allDays=getDays();var today=new Date();today.setHours(0,0,0,0);for(var i=0;i<allDays.length;i++){var d=allDays[i];if(d<=today)continue;if(dayHasMissing(d,i,allDays))return{day:d,dayName:UZ_DAYS[d.getDay()]};}return null;}
function getXaridInfo(){var missing=findFirstMissingDay();if(!missing)return null;var today=new Date();today.setHours(0,0,0,0);var dayBefore=new Date(missing.day);dayBefore.setDate(missing.day.getDate()-1);return{day:missing.day,dayName:missing.dayName,isUrgent:dayBefore.getTime()===today.getTime(),dateLabel:fmtDate(missing.day)+' '+missing.dayName};}
function getMissingProductsForXarid(){var allDays=getDays();var today=new Date();today.setHours(0,0,0,0);var missingProds={};for(var i=0;i<allDays.length;i++){var d=allDays[i];if(d<=today)continue;if(!dayHasMissing(d,i,allDays))continue;var plan=getDayPlan(d);MEAL_TIMES.forEach(function(mt){var ovqat=getOvqat(plan[mt.key]);if(!ovqat)return;ovqat.ingredients.forEach(function(ing){var rem=calcRemainingForDay(ing.productId,i,allDays);var needed=getRawNeeded(ing);if(rem<needed){var prod=getProd(ing.productId);if(!prod)return;if(!missingProds[ing.productId])missingProds[ing.productId]={prod:prod,needed:needed-Math.max(0,rem)};else missingProds[ing.productId].needed+=needed;}});});break;}return Object.values(missingProds);}
function calcEffectiveRemaining(item){var prod=getProd(item.productId);if(!prod)return item.rawAmount;if(!item.entryDate)return item.rawAmount;var entry=new Date(item.entryDate);entry.setHours(0,0,0,0);var today=new Date();today.setHours(0,0,0,0);var remaining=item.rawAmount;var cur=new Date(entry);while(cur<today){var plan=getDayPlan(cur);MEAL_TIMES.forEach(function(mt){var ovqat=getOvqat(plan[mt.key]);if(!ovqat)return;ovqat.ingredients.forEach(function(ing){if(ing.productId===item.productId)remaining-=getRawNeeded(ing);});});cur.setDate(cur.getDate()+1);}return Math.max(0,Math.round(remaining*10)/10);}
function calcDaysLeft(item){var prod=getProd(item.productId);if(!prod)return 0;var effective=calcEffectiveRemaining(item);var daily=prod.dailyRaw?prod.dailyRaw:prod.dailyCooked/prod.coef;return Math.round((effective/daily)*10)/10;}
function statusClass(d){return d>=3?'status-green':d>=1?'status-warn':'status-red';}
function statusColor(d){return d>=3?'#558237':d>=1?'#AA7B08':'#c0392b';}

  for(var i=0;i<allDays.length;i++){var d=allDays[i];var tod=isToday(d);var yest=isYesterday(d);var past=isPast(d);var miss=dayHasMissing(d,i,allDays);var plan=getDayPlan(d);var mealNames=MEAL_TIMES.map(function(mt){var o=getOvqat(plan[mt.key]);return o?o.name:null;}).filter(Boolean);
    h+='<div class="day-card'+(!past&&miss?' warn-red':'')+'" data-ts="'+d.getTime()+'">';

    var itemsStr=ovqat?ovqat.ingredients.map(function(ing){var p=getProd(ing.productId);if(!p)return'';var cooked=getCookedAmount(ing);var raw=getRawNeeded(ing);if(p.coef!==1)return p.name+' '+cooked+p.unit+' <span style="opacity:0.55;font-size:11px">('+raw+'g xom)</span>';return p.name+' '+raw+p.unit;}).join(' · '):'—';
    h+='<div class="meal-card'+(hasMissing?' missing':'')+'" data-time="'+mt.key+'">';

    h+='</div>';
  });
  h+='</div>';app.innerHTML=h;bc();

// OVQAT
function buildOvqatEmoji(){var h='';OVQAT_EMOJIS.forEach(function(e){h+='<button style="width:40px;height:40px;border:2px solid '+(e===ovqatSelectedEmoji?'var(--accent)':'transparent')+';background:'+(e===ovqatSelectedEmoji?'#e8f0e0':'var(--bg)')+';border-radius:8px;font-size:22px;cursor:pointer;" data-emoji="'+e+'">'+e+'</button>';});document.getElementById('ovqat-emoji-grid').innerHTML=h;document.querySelectorAll('#ovqat-emoji-grid button').forEach(function(btn){btn.addEventListener('click',function(){ovqatSelectedEmoji=this.getAttribute('data-emoji');buildOvqatEmoji();});});}
function renderTempIngs(){var h='';tempIngredients.forEach(function(ing,i){var prod=getProd(ing.productId);if(!prod)return;var raw=getRawNeeded(ing);var cooked=getCookedAmount(ing);var label=prod.coef!==1?raw+'g xom → '+cooked+'g pishgan':raw+prod.unit;h+='<div class="ing-row"><span class="ing-name">'+prod.icon+' '+prod.name+'</span><span class="ing-amount">'+label+'</span><button class="ing-del" data-iidx="'+i+'">×</button></div>';});document.getElementById('ovqat-ings').innerHTML=h;document.querySelectorAll('.ing-del').forEach(function(btn){btn.addEventListener('click',function(){tempIngredients.splice(parseInt(this.getAttribute('data-iidx')),1);renderTempIngs();});});}
function openOvqatModal(oid){editingOvqatId=oid;if(oid){var o=getOvqat(oid);document.getElementById('ovqat-modal-title').textContent='Tahrir';document.getElementById('ovqat-name').value=o.name;ovqatSelectedEmoji=o.icon;tempIngredients=JSON.parse(JSON.stringify(o.ingredients));document.getElementById('ovqat-del').style.display='flex';}else{document.getElementById('ovqat-modal-title').textContent='Yangi ovqat';document.getElementById('ovqat-name').value='';ovqatSelectedEmoji='🍲';tempIngredients=[];document.getElementById('ovqat-del').style.display='none';}buildOvqatEmoji();renderTempIngs();document.getElementById('modal-ovqat').classList.add('open');}
document.getElementById('modal-ovqat').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('ovqat-cancel').addEventListener('click',function(){document.getElementById('modal-ovqat').classList.remove('open');});
document.getElementById('ovqat-add-ing').addEventListener('click',openIngModal);
document.getElementById('ovqat-save').addEventListener('click',function(){var name=document.getElementById('ovqat-name').value.trim();if(!name){document.getElementById('ovqat-name').focus();return;}if(editingOvqatId){var o=getOvqat(editingOvqatId);o.name=name;o.icon=ovqatSelectedEmoji;o.ingredients=JSON.parse(JSON.stringify(tempIngredients));}else{ovqatlar.push({id:'ovqat_'+Date.now(),name:name,icon:ovqatSelectedEmoji,ingredients:JSON.parse(JSON.stringify(tempIngredients))});}saveData();document.getElementById('modal-ovqat').classList.remove('open');render();showToast('Saqlandi ✓');});
document.getElementById('ovqat-del').addEventListener('click',function(){if(!confirm("O'chirishni tasdiqlaysizmi?"))return;ovqatlar=ovqatlar.filter(function(o){return o.id!==editingOvqatId;});saveData();document.getElementById('modal-ovqat').classList.remove('open');render();showToast("O'chirildi");});
function buildIngList(){var q=document.getElementById('ing-search').value.toLowerCase();var filtered=DEFAULT_PRODUCTS.filter(function(p){return p.name.toLowerCase().includes(q);});var h='';filtered.forEach(function(p){h+='<button class="product-btn'+(ingSelectedProduct&&ingSelectedProduct.id===p.id?' selected':'')+'" data-id="'+p.id+'"><span class="product-btn-icon">'+p.icon+'</span><span><div class="product-btn-name">'+p.name+'</div><div class="product-btn-unit">'+p.unit+(p.coefLabel?' · '+p.coefLabel:'')+'</div></span></button>';});document.getElementById('ing-list').innerHTML=h;document.querySelectorAll('#ing-list .product-btn').forEach(function(btn){btn.addEventListener('click',function(){ingSelectedProduct=getProd(btn.getAttribute('data-id'));buildIngList();document.getElementById('ing-amount').classList.add('show');document.getElementById('ing-label').textContent=ingSelectedProduct.name+' (xom, '+ingSelectedProduct.unit+')';document.getElementById('ing-unit').textContent=ingSelectedProduct.unit;var ci=document.getElementById('ing-coef-info');if(ingSelectedProduct.coefLabel){ci.style.display='block';ci.textContent='📌 '+ingSelectedProduct.coefLabel;}else ci.style.display='none';document.getElementById('ing-input').value='';setTimeout(function(){document.getElementById('ing-input').focus();document.getElementById('ing-amount').scrollIntoView({behavior:'smooth',block:'end'});},100);});});}
function openIngModal(){ingSelectedProduct=null;document.getElementById('ing-search').value='';document.getElementById('ing-input').value='';document.getElementById('ing-amount').classList.remove('show');buildIngList();document.getElementById('modal-ing').classList.add('open');}
document.getElementById('modal-ing').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
document.getElementById('ing-search').addEventListener('input',buildIngList);
document.getElementById('ing-cancel').addEventListener('click',function(){document.getElementById('modal-ing').classList.remove('open');});
document.getElementById('ing-save').addEventListener('click',function(){if(!ingSelectedProduct)return;var rawAmt=parseFloat(document.getElementById('ing-input').value);if(!rawAmt||rawAmt<=0){document.getElementById('ing-input').focus();return;}var prod=ingSelectedProduct;var cookedAmt=prod.coef!==1?Math.round(rawAmt*prod.coef*10)/10:rawAmt;var ex=tempIngredients.find(function(i){return i.productId===prod.id;});if(ex){ex.rawAmount=rawAmt;ex.cookedAmount=cookedAmt;}else tempIngredients.push({productId:prod.id,rawAmount:rawAmt,cookedAmount:cookedAmt});document.getElementById('modal-ing').classList.remove('open');renderTempIngs();});

// INIT
loadData();
render();
sbLoad().then(function(ok){if(ok)render();}).catch(function(e){console.error('SB error:',e);});
</script>
</body>
</html>
