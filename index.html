<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kirish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }

#select-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.select-box { width: 100%; max-width: 340px; }
.select-title { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
.select-sub { text-align: center; font-size: 14px; color: #888; margin-bottom: 32px; }
.app-card { border-radius: 16px; padding: 20px; cursor: pointer; display: flex; align-items: center; gap: 14px; border: 2px solid transparent; transition: all 0.2s; margin-bottom: 12px; }
.app-card:active { transform: scale(0.98); }
.app-card.uma { background: #e8f5e0; border-color: #558237; }
.app-card.sirly { background: #e3f2e8; border-color: #1a6b42; }
.app-card-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.app-card.uma .app-card-icon { background: #1e5927; }
.app-card.sirly .app-card-icon { background: #0d4a2e; }
.app-card-info { flex: 1; }
.app-card-name { font-size: 17px; font-weight: 700; }
.app-card.uma .app-card-name { color: #1e5927; }
.app-card.sirly .app-card-name { color: #0d4a2e; }
.app-card-desc { font-size: 13px; margin-top: 2px; }
.app-card.uma .app-card-desc { color: #558237; }
.app-card.sirly .app-card-desc { color: #1a6b42; }
.app-card-arrow { font-size: 20px; color: #aaa; }

#login-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 24px; }
#login-screen.uma-theme { background: #f0f3ee; }
#login-screen.sirly-theme { background: #0d4a2e; }
.login-box { width: 100%; max-width: 340px; }
.login-logo { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 12px; }
.uma-theme .login-logo { background: #1e5927; }
.sirly-theme .login-logo { background: rgba(255,255,255,0.15); }
.login-app-name { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.uma-theme .login-app-name { color: #1e5927; }
.sirly-theme .login-app-name { color: #fff; }
.login-sub { text-align: center; font-size: 13px; margin-bottom: 32px; }
.uma-theme .login-sub { color: #7a9669; }
.sirly-theme .login-sub { color: rgba(255,255,255,0.6); }
.login-label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
.uma-theme .login-label { color: #7a9669; }
.sirly-theme .login-label { color: rgba(255,255,255,0.7); }
.login-input { width: 100%; border-radius: 10px; padding: 14px; font-size: 16px; outline: none; margin-bottom: 14px; border: 1px solid transparent; }
.uma-theme .login-input { background: #fff; color: #1e2e1a; border-color: #e2e8de; }
.sirly-theme .login-input { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
.sirly-theme .login-input::placeholder { color: rgba(255,255,255,0.4); }
.login-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 4px; font-family: inherit; }
.uma-theme .login-btn { background: #558237; color: white; }
.sirly-theme .login-btn { background: #a8e063; color: #0d4a2e; }
.login-error { font-size: 13px; text-align: center; margin-bottom: 10px; display: none; }
.uma-theme .login-error { color: #c0392b; }
.sirly-theme .login-error { color: #ff9090; }
.login-back { background: none; border: none; cursor: pointer; font-size: 13px; margin-top: 16px; display: block; width: 100%; text-align: center; font-family: inherit; }
.uma-theme .login-back { color: #7a9669; }
.sirly-theme .login-back { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<div id="select-screen">
  <div class="select-box">
    <div class="select-title">Ilovani tanlang</div>
    <div class="select-sub">Qaysi tizimga kirasiz?</div>
    <div class="app-card uma" id="sel-uma">
      <div class="app-card-icon">🌿</div>
      <div class="app-card-info">
        <div class="app-card-name">Uma-tizim</div>
        <div class="app-card-desc">Shaxsiy rivojlanish</div>
      </div>
      <div class="app-card-arrow">›</div>
    </div>
    <div class="app-card sirly" id="sel-sirly">
      <div class="app-card-icon">📋</div>
      <div class="app-card-info">
        <div class="app-card-name">Sirly</div>
        <div class="app-card-desc">Kim nima ishni qanday qiladi</div>
      </div>
      <div class="app-card-arrow">›</div>
    </div>
  </div>
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo" id="login-logo">🌿</div>
    <div class="login-app-name" id="login-app-name">Uma-tizim</div>
    <div class="login-sub" id="login-sub">Shaxsiy rivojlanish</div>
    <label class="login-label">Login</label>
    <input id="login-input" type="text" class="login-input" placeholder="loginni kiriting" autocomplete="off" autocapitalize="none">
    <label class="login-label">Parol</label>
    <input id="parol-input" type="password" class="login-input" placeholder="parolni kiriting">
    <div id="login-error" class="login-error">Login yoki parol noto'g'ri</div>
    <button id="login-btn" class="login-btn">Kirish</button>
    <button id="login-back" class="login-back">← Orqaga</button>
  </div>
</div>

<script>
if(window.Telegram && window.Telegram.WebApp){ Telegram.WebApp.ready(); Telegram.WebApp.expand(); }

var CURRENT_APP = null;
var UMA_USERS = { 'umid': 'umid2025', 'test': 'test123' };
var SIRLY_USERS = { 'testlogin': 'test26', 'admin': 'admin123' };

// Saved login tekshir
var saved = localStorage.getItem('app_login');
if(saved){
  try{
    var u = JSON.parse(saved);
    var users = u.app === 'uma' ? UMA_USERS : SIRLY_USERS;
    if(users[u.login] && users[u.login] === u.parol){
      window.location.href = '/' + u.app + '?uid=' + u.app + '_' + u.login;
    }
  }catch(e){ localStorage.removeItem('app_login'); }
}

document.getElementById('sel-uma').addEventListener('click', function(){ showLogin('uma'); });
document.getElementById('sel-sirly').addEventListener('click', function(){ showLogin('sirly'); });

function showLogin(app){
  CURRENT_APP = app;
  var ls = document.getElementById('login-screen');
  ls.className = app + '-theme';
  ls.style.display = 'flex';
  document.getElementById('select-screen').style.display = 'none';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-input').value = '';
  document.getElementById('parol-input').value = '';
  if(app === 'uma'){
    document.getElementById('login-logo').textContent = '🌿';
    document.getElementById('login-app-name').textContent = 'Uma-tizim';
    document.getElementById('login-sub').textContent = 'Shaxsiy rivojlanish';
  } else {
    document.getElementById('login-logo').textContent = '📋';
    document.getElementById('login-app-name').textContent = 'Sirly';
    document.getElementById('login-sub').textContent = 'Kim nima ishni qanday qiladi';
  }
  setTimeout(function(){ document.getElementById('login-input').focus(); }, 200);
}

document.getElementById('login-back').addEventListener('click', function(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
});

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('parol-input').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

function doLogin(){
  var login = document.getElementById('login-input').value.trim().toLowerCase();
  var parol = document.getElementById('parol-input').value;
  var users = CURRENT_APP === 'uma' ? UMA_USERS : SIRLY_USERS;
  if(users[login] && users[login] === parol){
    var uid = CURRENT_APP + '_' + login;
    localStorage.setItem('app_login', JSON.stringify({app: CURRENT_APP, login: login, parol: parol}));
    window.location.href = '/' + CURRENT_APP + '?uid=' + uid;
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('parol-input').value = '';
  }
}
</script>
</body>
</html>
