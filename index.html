<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kim nima ishni qanday qiladi?</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--tg-theme-bg-color,#f5f5f3);color:var(--tg-theme-text-color,#1a1a1a);font-size:14px;min-height:100vh}
:root{--acc:var(--tg-theme-button-color,#1a1a1a);--acc-text:var(--tg-theme-button-text-color,#fff);--hint:var(--tg-theme-hint-color,#888);--bg2:var(--tg-theme-secondary-bg-color,#fff);--border:rgba(0,0,0,0.08)}
.page{display:none;padding:16px}.page.active{display:block}
.page-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.back-btn{background:transparent;border:none;font-size:13px;color:var(--acc);cursor:pointer;font-family:inherit;font-weight:600;padding:0}
.page-title{font-size:16px;font-weight:700}
.home-header{padding:24px 16px 16px}
.home-title{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.home-sub{font-size:13px;color:var(--hint);margin-top:3px}
.section-list{display:flex;flex-direction:column;gap:8px}
.section-item{background:var(--bg2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.section-item:active{opacity:.7}
.section-item.dragging{opacity:.4}
.section-item.drag-over{border:2px dashed var(--acc)}
.section-num{width:28px;height:28px;border-radius:8px;background:rgba(0,0,0,0.05);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--hint);flex-shrink:0;margin-right:12px}
.section-name{font-size:14px;font-weight:600}
.chevron{color:var(--hint);font-size:16px}
.drag-handle{display:flex;flex-direction:column;gap:3px;padding:4px;cursor:grab;margin-right:8px;opacity:.4}
.drag-handle span{display:block;width:14px;height:2px;background:var(--hint);border-radius:2px}
.drag-handle:active{cursor:grabbing}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.nav-card{background:var(--bg2);border-radius:12px;padding:16px;cursor:pointer;position:relative;min-height:80px}
.nav-card:active{opacity:.7}
.nav-card.dragging{opacity:.4}
.nav-card.drag-over{outline:2px dashed var(--acc)}
.nav-card-title{font-size:14px;font-weight:700}
.nav-card-arrow{position:absolute;bottom:12px;right:12px;font-size:14px;opacity:.2}
.nav-card-drag{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:2px;padding:3px;cursor:grab;opacity:.3}
.nav-card-drag span{display:block;width:12px;height:2px;background:var(--hint);border-radius:2px}
.add-btn{width:100%;padding:13px;background:transparent;border:1.5px dashed var(--border);border-radius:12px;font-size:13px;color:var(--hint);cursor:pointer;font-family:inherit;margin-top:4px}
.add-item-btn{width:100%;padding:11px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;font-size:13px;color:var(--hint);cursor:pointer;font-family:inherit;margin-top:6px}
.search-wrap{margin-bottom:12px}
.search-inp{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--bg2);color:var(--tg-theme-text-color,#1a1a1a);outline:none}
.form-box{background:var(--bg2);border-radius:12px;padding:14px;margin-top:8px}
.fi{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:rgba(0,0,0,0.03);color:var(--tg-theme-text-color,#1a1a1a);outline:none;margin-top:4px}
.fi:focus{border-color:var(--acc)}
.flbl{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.5px}
.frow{margin-bottom:10px}
.fbtns{display:flex;gap:8px;margin-top:12px}
.fsave{background:var(--acc);color:var(--acc-text);border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.fcancel{background:transparent;border:1px solid var(--border);padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--hint);font-family:inherit}
.action-btns{display:flex;gap:4px;align-items:center}
.abtn{border:1px solid var(--border);background:transparent;border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--hint)}
.abtn-red{border-color:rgba(220,38,38,.3);color:#dc2626}
.nav-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0}
.nav-card:hover .nav-card-actions{opacity:1}
.tree-wrap{overflow-x:auto;padding-bottom:16px}
.tree-col{display:flex;flex-direction:column}
.node-row{display:flex;flex-direction:row;align-items:flex-start;margin-bottom:10px}
.node-card{width:260px;flex-shrink:0;background:var(--bg2);border-radius:10px;padding:12px;position:relative}
.node-num{position:absolute;top:10px;left:10px;width:26px;height:26px;background:rgba(0,0,0,0.06);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--tg-theme-text-color,#1a1a1a)}
.node-name{font-size:13px;font-weight:600;line-height:1.4;margin-top:30px;padding-right:36px}
.node-msg{background:rgba(0,0,0,0.04);border-radius:6px;padding:8px 30px 8px 8px;font-size:11px;line-height:1.6;margin-top:8px;white-space:pre-wrap;position:relative;font-family:monospace}
.copy-btn{position:absolute;top:5px;right:5px;width:20px;height:20px;border:1px solid var(--border);background:var(--bg2);border-radius:4px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;opacity:.7}
.node-link{font-size:11px;color:var(--hint);margin-top:6px;word-break:break-all}
.node-link a{color:var(--acc)}
.node-corner{position:absolute;top:5px;right:5px;display:flex;gap:2px;opacity:0}
.node-card:hover .node-corner{opacity:1}
.corner-btn{width:20px;height:20px;border:1px solid var(--border);background:var(--bg2);border-radius:4px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:var(--hint)}
.corner-btn.always{opacity:1!important}
.connector{display:flex;flex-direction:row;align-items:stretch}
.vbar-wrap{width:24px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.vbar{width:1px;background:var(--border);flex:1}
.children-col{display:flex;flex-direction:column}
.child-row{display:flex;align-items:flex-start}
.hbar{width:24px;height:1px;background:var(--border);flex-shrink:0;margin-top:22px}
.add-child-btn{width:260px;padding:7px 10px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;font-size:11px;color:var(--hint);cursor:pointer;font-family:inherit;text-align:left;margin-bottom:8px}
.add-root-btn{padding:9px 14px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;font-size:12px;color:var(--hint);cursor:pointer;font-family:inherit;margin-top:6px;display:flex;align-items:center;gap:6px}
.node-form{width:260px;background:var(--bg2);border-radius:10px;padding:12px;margin-bottom:8px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg2);border-radius:16px;padding:20px;width:300px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--hint);margin-bottom:14px}
.modal-err{font-size:11px;color:#dc2626;margin-top:6px;display:none}
.modal-err.show{display:block}
.notif{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;cursor:zoom-out}
.img-modal.open{display:flex}
.img-modal img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.breadcrumb{padding:8px 16px 0;font-size:12px;color:var(--hint);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.bc-item{cursor:pointer;color:var(--acc)}.bc-sep{opacity:.4}.bc-cur{color:var(--tg-theme-text-color,#1a1a1a);font-weight:500}

/* ACADEMY */
.acad-section{margin-bottom:8px}
.acad-cat{background:var(--bg2);border-radius:12px;margin-bottom:8px}
.acad-cat-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acad-cat-title{font-size:15px;font-weight:700}
.acad-cat-arrow{font-size:16px;color:var(--hint);transition:transform .2s}
.acad-cat.open .acad-cat-arrow{transform:rotate(90deg)}
.acad-cat-body{display:none;padding:0 16px 14px}
.acad-cat.open .acad-cat-body{display:block}
.acad-cat-desc{font-size:13px;color:var(--hint);margin-bottom:12px;line-height:1.6}
.acad-item{background:rgba(0,0,0,0.03);border-radius:10px;margin-bottom:6px;overflow:hidden}
.acad-item-header{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.acad-item-title{font-size:13px;font-weight:600}
.acad-item-arrow{font-size:14px;color:var(--hint);transition:transform .2s}
.acad-item.open .acad-item-arrow{transform:rotate(90deg)}
.acad-item-body{display:none;padding:12px 14px;border-top:1px solid var(--border)}
.acad-item.open .acad-item-body{display:block}
.acad-intro{background:rgba(0,122,255,0.06);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.7;color:var(--tg-theme-text-color,#1a1a1a)}
.acad-content{font-size:13px;line-height:1.8;color:var(--tg-theme-text-color,#1a1a1a)}
.acad-content ul{padding-left:18px;margin:6px 0}
.acad-content li{margin-bottom:4px}
.acad-content b{font-weight:700}
.acad-section-block{background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.acad-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding:3px 8px;border-radius:6px;display:inline-block}
.acad-label-standard{background:rgba(99,102,241,.1);color:#6366f1}
.acad-label-violation{background:rgba(220,38,38,.1);color:#dc2626}
.acad-label-decision{background:rgba(34,197,94,.1);color:#16a34a}
.acad-add-btn{width:100%;padding:11px;background:transparent;border:1.5px dashed var(--border);border-radius:10px;font-size:13px;color:var(--hint);cursor:pointer;font-family:inherit;margin-top:6px}
.acad-form{background:var(--bg2);border-radius:12px;padding:14px;margin-top:8px}
</style>
</head>
<body>

<div class="page active" id="p-home">
  <div class="home-header">
    <div class="home-title">Kim nima ishni qanday qiladi?</div>
    <div class="home-sub">Bo'limni tanlang</div>
  </div>
  <div style="padding:0 16px">
    <div id="sections-grid" class="cards-grid"></div>
    <div id="section-form"></div>
  </div>
</div>

<div class="page" id="p-section">
  <div class="breadcrumb" id="bc-section"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-home')">← Orqaga</button>
      <span class="page-title" id="section-title"></span>
    </div>
    <div class="search-wrap"><input class="search-inp" id="search-cats" placeholder="🔍 Qidirish..." oninput="renderCats()"></div>
    <div id="cats-list" class="section-list"></div>
    <div id="cat-form"></div>
  </div>
</div>

<div class="page" id="p-cat">
  <div class="breadcrumb" id="bc-cat"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-section')">← Orqaga</button>
      <span class="page-title" id="cat-title"></span>
    </div>
    <div class="search-wrap"><input class="search-inp" id="search-flows" placeholder="🔍 Qidirish..." oninput="renderFlows()"></div>
    <div id="flows-list" class="section-list"></div>
    <div id="flow-form"></div>
  </div>
</div>

<div class="page" id="p-flow">
  <div class="breadcrumb" id="bc-flow"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-cat')">← Orqaga</button>
      <span class="page-title" id="flow-title"></span>
      <div id="flow-admin-btns" style="display:none;margin-left:auto;gap:4px;display:none">
        <button class="abtn" onclick="editFlowName()">✏</button>
        <button class="abtn abtn-red" onclick="deleteFlow()">✕</button>
      </div>
    </div>
    <div id="flow-name-form" style="display:none;margin-bottom:14px"></div>
    <div class="tree-wrap" id="tree-wrap"></div>
    <div id="root-form"></div>

</div>


<div class="page" id="p-acad-cats">
  <div class="breadcrumb" id="bc-acad-cats"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-home')">← Orqaga</button>
      <span class="page-title" id="acad-sec-title"></span>
    </div>
    <div id="acad-cats-list" class="section-list"></div>
    <div id="acad-cats-form"></div>
  </div>
</div>

<div class="page" id="p-acad-items">
  <div class="breadcrumb" id="bc-acad-items"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-acad-cats')">← Orqaga</button>
      <span class="page-title" id="acad-cat-title"></span>
    </div>
    <div id="acad-cat-intro-box"></div>
    <div id="acad-items-list" class="section-list"></div>
    <div id="acad-items-form"></div>
  </div>
</div>

<div class="page" id="p-acad-detail">
  <div class="breadcrumb" id="bc-acad-detail"></div>
  <div style="padding:16px">
    <div class="page-header">
      <button class="back-btn" onclick="goBack('p-acad-items')">← Orqaga</button>
      <span class="page-title" id="acad-item-title"></span>
    </div>
    <div id="acad-detail-body"></div>
  </div>
</div>
<div class="modal-bg" id="login-modal">
  <div class="modal-box">
    <div class="modal-title">Admin kirish</div>
    <div class="modal-sub">Tahrirlash uchun kiring</div>
    <div class="frow"><label class="flbl">Login</label><input class="fi" id="l-login" autocomplete="off"></div>
    <div class="frow"><label class="flbl">Parol</label><input class="fi" id="l-pass" type="password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="modal-err" id="l-err">Noto'g'ri</div>
    <div class="fbtns" style="margin-top:14px">
      <button class="fsave" onclick="doLogin()">Kirish</button>
      <button class="fcancel" onclick="closeModal()">Bekor</button>
    </div>
  </div>
</div>

<div class="img-modal" id="img-modal" onclick="closeImg()"><img id="img-src" src="" alt=""></div>
<div class="notif" id="notif"></div>

<div style="position:fixed;top:0;right:0;z-index:50;padding:10px">
  <button id="admin-btn" onclick="handleAdmin()" style="border:1px solid var(--border);background:var(--bg2);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--hint)">⚙ Admin</button>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

const ADMIN_L='testlogin',ADMIN_P='test26';
let isAdmin=false;
const DB_KEY='biznes_db_v1';

let db={sections:[]};
let curSection=null,curCat=null,curFlow=null;
let navStack=['p-home'];

const SB_URL='https://ubakgpkcemlchpfejmke.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViYWtncGtjZW1sY2hwZmVqbWtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjc3NzUsImV4cCI6MjA5NTkwMzc3NX0.wkKSmoTB9RwREFjcJfe0dNBzZDEw2DHxNM3G6erHSJU';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function save(){
  try{
    await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.main',{
      method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},
      body:JSON.stringify({data:db})
    });
  }catch(e){localStorage.setItem(DB_KEY,JSON.stringify(db));}
}
async function load(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.main',{headers:SB_H});
    const rows=await r.json();
    if(rows&&rows.length&&rows[0].data&&rows[0].data.sections) db=rows[0].data;
    else{const d=localStorage.getItem(DB_KEY);if(d)db=JSON.parse(d);}
  }catch(e){const d=localStorage.getItem(DB_KEY);if(d)db=JSON.parse(d);}
}

function goTo(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active','fade');
  if(navStack[navStack.length-1]!==p) navStack.push(p);
  render(p);window.scrollTo(0,0);
}
function goBack(p){
  while(navStack[navStack.length-1]!==p&&navStack.length>1) navStack.pop();
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById(p).classList.add('active');
  render(p);window.scrollTo(0,0);
}
function render(p){
  if(p==='p-home') renderSections();
  else if(p==='p-section') renderCats();
  else if(p==='p-cat') renderFlows();
  else if(p==='p-flow') renderTree();
  else if(p==='p-acad-cats') renderAcadCats();
  else if(p==='p-acad-items') renderAcadItems();
  else if(p==='p-acad-detail') renderAcadDetail();
  updateBc();
}
function updateBc(){
  const sec=db.sections.find(s=>s.id===curSection);
  const cat=sec?.cats.find(c=>c.id===curCat);
  const flow=cat?.flows.find(f=>f.id===curFlow);
  const map={'p-home':'Bosh sahifa','p-section':sec?.title||'','p-cat':cat?.title||'','p-flow':flow?.title||''};
  navStack.forEach((p,i)=>{
    // Skip academy pages — they handle their own breadcrumbs
    if(p.startsWith('p-acad')) return;
    const el=document.getElementById('bc-'+p.replace('p-',''));
    if(!el) return;
    let html='';
    navStack.slice(0,i+1).forEach((pp,ii)=>{
      if(pp.startsWith('p-acad')) return;
      if(ii<i) html+=`<span class="bc-item" onclick="goBack('${pp}')">${map[pp]||''}</span><span class="bc-sep">›</span>`;
      else html+=`<span class="bc-cur">${map[pp]||''}</span>`;
    });
    el.innerHTML=html;
  });
}

function handleAdmin(){isAdmin?logout():openModal()}
function openModal(){
  document.getElementById('login-modal').classList.add('open');
  document.getElementById('l-login').value='';
  document.getElementById('l-pass').value='';
  document.getElementById('l-err').classList.remove('show');
  setTimeout(()=>document.getElementById('l-login').focus(),100);
}
function closeModal(){document.getElementById('login-modal').classList.remove('open')}
function doLogin(){
  const l=document.getElementById('l-login').value.trim();
  const p=document.getElementById('l-pass').value;
  if(l===ADMIN_L&&p===ADMIN_P){
    isAdmin=true;closeModal();
    const btn=document.getElementById('admin-btn');
    btn.textContent='⚙ Chiqish';btn.style.background='#1a1a1a';btn.style.color='#fff';
    notify('Admin ✓');render(navStack[navStack.length-1]);
  }else{document.getElementById('l-err').classList.add('show');document.getElementById('l-pass').value='';}
}
function logout(){
  isAdmin=false;
  const btn=document.getElementById('admin-btn');
  btn.textContent='⚙ Admin';btn.style.background='';btn.style.color='';
  notify('Chiqildi');render(navStack[navStack.length-1]);
}

// ---- DRAG LIST ----
let dragSrcIndex=null,dragContext=null;
function initDrag(listEl,getItems,setItems){
  const items=listEl.querySelectorAll('[draggable="true"]');
  items.forEach((el,i)=>{
    el.addEventListener('dragstart',e=>{
      dragSrcIndex=i;dragContext={getItems,setItems};
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>el.classList.add('dragging'),0);
    });
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');
      listEl.querySelectorAll('[draggable="true"]').forEach(x=>x.classList.remove('drag-over'));
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      listEl.querySelectorAll('[draggable="true"]').forEach(x=>x.classList.remove('drag-over'));
      el.classList.add('drag-over');
    });
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(dragSrcIndex===null||dragSrcIndex===i) return;
      const arr=dragContext.getItems();
      const moved=arr.splice(dragSrcIndex,1)[0];
      arr.splice(i,0,moved);
      dragContext.setItems(arr);
      save();dragSrcIndex=null;dragContext=null;
    });
  });
}

function initTouchDrag(listEl,getItems,setItems,selector='[draggable="true"]'){
  let ti=null,clone=null,startY=0;
  const items=()=>listEl.querySelectorAll(selector);
  listEl.addEventListener('touchstart',e=>{
    const handle=e.target.closest('.drag-handle,.nav-card-drag');
    if(!handle) return;
    const item=handle.closest(selector);
    const all=[...items()];
    ti=all.indexOf(item);startY=e.touches[0].clientY;
    clone=item.cloneNode(true);
    const rect=item.getBoundingClientRect();
    clone.style.cssText=`position:fixed;z-index:9999;width:${item.offsetWidth}px;opacity:0.8;pointer-events:none;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);top:${rect.top}px;left:${rect.left}px`;
    document.body.appendChild(clone);
    item.style.opacity='0.4';
  },{passive:true});
  listEl.addEventListener('touchmove',e=>{
    if(ti===null||!clone) return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    const dy=y-startY;
    const rect=[...items()][ti].getBoundingClientRect();
    clone.style.top=(rect.top+dy)+'px';
    [...items()].forEach((el,i)=>{
      const r=el.getBoundingClientRect();
      el.classList.toggle('drag-over',i!==ti&&y>r.top&&y<r.bottom);
    });
  },{passive:false});
  listEl.addEventListener('touchend',e=>{
    if(ti===null) return;
    if(clone){clone.remove();clone=null;}
    [...items()].forEach(x=>{x.classList.remove('drag-over');x.style.opacity='';});
    const y=e.changedTouches[0].clientY;
    let target=ti;
    [...items()].forEach((el,i)=>{
      const r=el.getBoundingClientRect();
      if(y>r.top&&y<r.bottom&&i!==ti) target=i;
    });
    if(target!==ti){
      const arr=getItems();
      const moved=arr.splice(ti,1)[0];
      arr.splice(target,0,moved);
      setItems(arr);save();
    }
    ti=null;
  },{passive:true});
}

// ======== ACADEMY ========
const ACAD_KEY='academy_db_v1';
let acadDb={sections:[]};
let curAcadSec=null,curAcadCat=null,curAcadItem=null;

async function acadSave(){
  try{
    await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.academy',{
      method:'PATCH',headers:{...SB_H,'Prefer':'return=minimal'},
      body:JSON.stringify({data:acadDb})
    });
  }catch(e){localStorage.setItem(ACAD_KEY,JSON.stringify(acadDb));}
}
async function acadLoad(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/biznes_data?id=eq.academy',{headers:SB_H});
    const rows=await r.json();
    if(rows&&rows.length&&rows[0].data&&rows[0].data.sections){
      acadDb=rows[0].data;
    }else{
      const d=localStorage.getItem(ACAD_KEY);
      if(d) acadDb=JSON.parse(d);
      // Create record in Supabase
      try{
        await fetch(SB_URL+'/rest/v1/biznes_data',{
          method:'POST',headers:{...SB_H,'Prefer':'return=minimal'},
          body:JSON.stringify({id:'academy',data:acadDb})
        });
      }catch(e2){}
    }
  }catch(e){const d=localStorage.getItem(ACAD_KEY);if(d)acadDb=JSON.parse(d);}
  renderSections();
}

// Format text: **bold**, * list item, newlines
function formatAcadText(t){
  if(!t) return '';
  let s=esc(t);
  s=s.split('**').map((p,i)=>i%2===1?'<b>'+p+'</b>':p).join('');
  const lines=s.split('\n');
  let out=[],inList=false;
  lines.forEach(line=>{
    if(line.startsWith('* ')){
      if(!inList){out.push('<ul>');inList=true;}
      out.push('<li>'+line.slice(2)+'</li>');
    }else{
      if(inList){out.push('</ul>');inList=false;}
      out.push(line?(line+'<br>'):'<br>');
    }
  });
  if(inList) out.push('</ul>');
  return out.join('');
}

// Level 3: Open item → show full content
function openAcadItem(id){

}

function renderAcadDetail(){
  const sec=acadDb.sections.find(s=>s.id===curAcadSec);if(!sec)return;
  const cat=sec.cats.find(c=>c.id===curAcadCat);if(!cat)return;
  const item=cat.items.find(i=>i.id===curAcadItem);if(!item)return;
  document.getElementById('acad-item-title').textContent=item.title;
  let h='';
  if(item.standard){
    h+=`<div class="acad-section-block">
      <div class="acad-section-label acad-label-standard">📋 Standart</div>
      <div class="acad-content">${formatAcadText(item.standard)}</div>
    </div>`;
  }
  if(item.violation){
    h+=`<div class="acad-section-block">
      <div class="acad-section-label acad-label-violation">⚠️ Qoidabuzarlik</div>
      <div class="acad-content">${formatAcadText(item.violation)}</div>
    </div>`;
  }
  if(item.decision){
    h+=`<div class="acad-section-block">
      <div class="acad-section-label acad-label-decision">✅ Qaror va harakat</div>
      <div class="acad-content">${formatAcadText(item.decision)}</div>
    </div>`;
  }
  if(!item.standard&&!item.violation&&!item.decision&&item.content){
    h+=`<div class="acad-content" style="padding:4px 0;line-height:1.9;font-size:14px">${formatAcadText(item.content)}</div>`;
  }
  if(isAdmin){
    h+=`<div style="margin-top:16px">
      <button class="fsave" onclick="showAcadItemForm('${curAcadSec}','${curAcadCat}','${item.id}',true)">✏ Tahrirlash</button>
    </div>
    <div id="acad-detail-form" style="margin-top:8px"></div>`;
  }
  document.getElementById('acad-detail-body').innerHTML=h;
  updateAcadBc();
}

// Breadcrumb for academy
function updateAcadBc(){
  const sec=acadDb.sections.find(s=>s.id===curAcadSec);
  const cat=sec?.cats?.find(c=>c.id===curAcadCat);
  const item=cat?.items?.find(i=>i.id===curAcadItem);
  const pages=['p-acad-cats','p-acad-items','p-acad-detail'];
  const titles={
    'p-home':'Bosh sahifa',
    'p-acad-cats':sec?.title||'',
    'p-acad-items':cat?.title||'',
    'p-acad-detail':item?.title||''
  };
  pages.forEach(p=>{
    const el=document.getElementById('bc-'+p.replace('p-',''));
    if(!el) return;
    const stack=['p-home',...pages.slice(0,pages.indexOf(p)+1)];
    let html='';
    stack.forEach((pp,ii)=>{
      if(ii<stack.length-1) html+=`<span class="bc-item" onclick="goBack('${pp}')">${titles[pp]}</span><span class="bc-sep">›</span>`;
      else html+=`<span class="bc-cur">${titles[pp]}</span>`;
    });
    el.innerHTML=html;
  });
}

// Forms
function showAcadCatForm(secId,catId){
  const sec=acadDb.sections.find(s=>s.id===secId);
  const cat=catId?sec?.cats.find(c=>c.id===catId):null;
  document.getElementById('acad-cats-form').innerHTML=`<div class="form-box fade">
    <div class="frow"><label class="flbl">Kategoriya nomi</label><input class="fi" id="acf-title" value="${esc(cat?.title||'')}" placeholder="Kategoriya nomi..."></div>
    <div class="frow"><label class="flbl">Kirish matni (sarlavha)</label><textarea class="fi" id="acf-intro" style="min-height:80px;resize:vertical" placeholder="Bu bo'limda nima o'rganiladi...">${esc(cat?.intro||'')}</textarea></div>
    <div class="fbtns">
      <button class="fsave" onclick="saveAcadCat('${secId}','${catId||''}')">Saqlash</button>
      <button class="fcancel" onclick="renderAcadCats()">Bekor</button>
    </div>
  </div>`;
  document.getElementById('acf-title').focus();
}

function saveAcadCat(secId,catId){
  const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;
  const title=document.getElementById('acf-title').value.trim();
  const intro=document.getElementById('acf-intro').value.trim();
  if(!title){notify('Nom kiriting!');return;}
  if(!sec.cats)sec.cats=[];
  if(catId){const c=sec.cats.find(x=>x.id===catId);if(c){c.title=title;c.intro=intro;}}
  else sec.cats.push({id:'ac'+Date.now(),title,intro,items:[]});
  acadSave();notify('Saqlandi ✓');renderAcadCats();
}

function delAcadCat(secId,catId){
  if(!confirm('O\'chirasizmi?'))return;
  const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;
  sec.cats=sec.cats.filter(c=>c.id!==catId);
  acadSave();notify("O'chirildi ✓");renderAcadCats();
}

function showAcadItemForm(secId,catId,itemId,inDetail){
  const sec=acadDb.sections.find(s=>s.id===secId);
  const cat=sec?.cats.find(c=>c.id===catId);
  const item=itemId?cat?.items.find(i=>i.id===itemId):null;
  const containerId=inDetail?'acad-detail-form':'acad-items-form';
  document.getElementById(containerId).innerHTML=`<div class="form-box fade">
    <div class="frow"><label class="flbl">Mavzu nomi</label><input class="fi" id="afi-title" value="${esc(item?.title||'')}" placeholder="Mavzu nomi..."></div>
    <div class="frow"><label class="flbl" style="color:#6366f1">📋 Standart</label><textarea class="fi" id="afi-standard" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qoida va ruxsat chegaralari...">${esc(item?.standard||'')}</textarea></div>
    <div class="frow"><label class="flbl" style="color:#dc2626">⚠️ Qoidabuzarlik</label><textarea class="fi" id="afi-violation" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qachon buzilgan hisoblanadi...">${esc(item?.violation||'')}</textarea></div>
    <div class="frow"><label class="flbl" style="color:#16a34a">✅ Qaror va harakat</label><textarea class="fi" id="afi-decision" style="min-height:100px;resize:vertical;font-size:12px;font-family:monospace" placeholder="Qaror va harakatlar...">${esc(item?.decision||'')}</textarea></div>

      <button class="fsave" onclick="saveAcadItem('${secId}','${catId}','${itemId||''}','${inDetail||''}')">Saqlash</button>
      <button class="fcancel" onclick="${inDetail?'renderAcadDetail()':'renderAcadItems()'}">Bekor</button>
    </div>

function saveAcadItem(secId,catId,itemId,inDetail){
  const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;
  const cat=sec.cats.find(c=>c.id===catId);if(!cat)return;
  const title=document.getElementById('afi-title').value.trim();
  const standard=document.getElementById('afi-standard').value.trim();
  const violation=document.getElementById('afi-violation').value.trim();
  const decision=document.getElementById('afi-decision').value.trim();
  if(!title){notify('Nom kiriting!');return;}
  if(!cat.items)cat.items=[];
  if(itemId){const it=cat.items.find(x=>x.id===itemId);if(it){it.title=title;it.standard=standard;it.violation=violation;it.decision=decision;}}
  else cat.items.push({id:'ai'+Date.now(),title,standard,violation,decision});
  acadSave();notify('Saqlandi ✓');
  if(inDetail) renderAcadDetail(); else renderAcadItems();
}

function delAcadItem(secId,catId,itemId){
  if(!confirm('O\'chirasizmi?'))return;
  const sec=acadDb.sections.find(s=>s.id===secId);if(!sec)return;
  const cat=sec.cats.find(c=>c.id===catId);if(!cat)return;
  cat.items=cat.items.filter(i=>i.id!==itemId);
  acadSave();notify("O'chirildi ✓");renderAcadItems();
}

// Academy sections on home
function showAcadSecForm(id){
  const sec=id?acadDb.sections.find(s=>s.id===id):null;
  document.getElementById('section-form').innerHTML=`<div class="form-box fade">
    <div class="frow"><label class="flbl">Akademiya bo'limi nomi</label><input class="fi" id="asf-title" value="${esc(sec?.title||'')}" placeholder="Masalan: Support Akademiyasi"></div>
    <div class="fbtns">
      <button class="fsave" onclick="saveAcadSection('${id||''}')">Saqlash</button>
      <button class="fcancel" onclick="renderSections()">Bekor</button>
    </div>
  </div>`;
  document.getElementById('asf-title').focus();
}
function saveAcadSection(id){
  const title=document.getElementById('asf-title').value.trim();
  if(!title){notify('Nom kiriting!');return;}
  if(!acadDb.sections)acadDb.sections=[];
  if(id){const s=acadDb.sections.find(x=>x.id===id);if(s)s.title=title;}
  else acadDb.sections.push({id:'as'+Date.now(),title,cats:[]});
  acadSave();notify('Saqlandi ✓');renderSections();
}
function editAcadSection(id){showAcadSecForm(id)}
function delAcadSection(id){
  if(!confirm('O\'chirasizmi?'))return;
  acadDb.sections=acadDb.sections.filter(s=>s.id!==id);
  acadSave();notify("O'chirildi ✓");renderSections();
}
